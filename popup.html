<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Request Breaker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
        width: 320px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
      }
      button {
        padding: 8px 10px;
        margin-right: 6px;
        cursor: pointer;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #333;
      }
      #blockedList {
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        max-height: 180px;
        overflow-y: auto;
        padding: 6px;
        font-size: 11px;
        background: #fafafa;
      }
      .blocked-item {
        padding: 4px 0;
        border-bottom: 1px dashed #ddd;
        word-break: break-all;
      }
      .blocked-item:last-child {
        border-bottom: none;
      }
      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #666;
      }
      .section {
        margin-bottom: 10px;
      }
      .inline-label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .inline-label label {
        margin-bottom: 0;
      }
      .count-and-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="inline-label" style="margin-bottom: 6px">
        <input id="enableHeaderFloat" type="checkbox" checked />
        <label for="targetHeaderName">フロート表示するレスポンスヘッダ名</label>
      </div>
      <input
        id="targetHeaderName"
        type="text"
        placeholder="例: server"
        value="server"
        style="width: 220px; padding: 4px 6px"
      />
      <div class="inline-label" style="margin-top: 8px; margin-bottom: 6px">
        <input id="enableRedirectDelay" type="checkbox" />
        <label for="redirectDelayMs">リダイレクト後のリクエスト送信を遅延させる (ms)</label>
      </div>
      <input
        id="redirectDelayMs"
        type="number"
        min="0"
        step="1"
        value="0"
        placeholder="例: 300"
        style="width: 120px; padding: 4px 6px"
      />
    </div>
    <label>全リクエストの一時停止</label>
    <div class="section">
      <label for="allowCount">停止前に通す件数 (N)</label>
      <div class="count-and-actions">
        <input id="allowCount" type="number" min="0" step="1" value="1" style="width: 90px; padding: 4px 6px" />
        <div>
          <button id="pause">一時停止</button>
          <button id="resume">再開</button>
        </div>
      </div>
    </div>
    <div id="status"></div>
    <div id="blockedList">ブロック中のURLはありません</div>
    <div class="hint">
      「一時停止」で最初のN件だけ送信し、それ以降をキューに保持します。<br />
      「再開」でキュー済み通信を送出します。
    </div>
    <script src="popup.js"></script>
  </body>
</html>
